<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>QRコードジェネレーター</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Zen+Kaku+Gothic+New:wght@400;500;700&family=DM+Serif+Display&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <div class="language-switcher">
    <button id="lang-ja" class="lang-btn lang-btn-active" data-lang="ja">日本語</button>
    <button id="lang-en" class="lang-btn" data-lang="en">English</button>
  </div>

  <main class="app-shell">
    <section class="card card-input">
      <p class="eyebrow" data-i18n="appName">QRCode Generator</p>
      <h1 data-i18n="title">QRコードを作成</h1>
      <p class="lead" data-i18n="description">文字列やURLを入力して、QRコード画像を生成できます。</p>

      <label for="qr-text" class="label" data-i18n="inputLabel">テキスト / URL</label>
      <textarea id="qr-text" class="text-input" rows="5" data-i18n-attr-placeholder="inputPlaceholder" placeholder="例: https://example.com"></textarea>

      <div class="controls">
        <button id="generate-btn" class="btn btn-primary" type="button" data-i18n="generateBtn">生成する</button>
        <button id="clear-btn" class="btn btn-ghost" type="button" data-i18n="clearBtn">クリア</button>
      </div>

      <p id="status" class="status" aria-live="polite"></p>
    </section>

    <section class="card card-output">
      <h2 data-i18n="preview">プレビュー</h2>
      <div id="qr-preview" class="qr-preview" data-i18n-attr-aria-label="previewAria"></div>

      <div class="controls controls-output">
        <button id="download-btn" class="btn btn-primary" type="button" disabled data-i18n="downloadBtn">画像をダウンロード</button>
        <button id="copy-btn" class="btn btn-secondary" type="button" disabled data-i18n="copyBtn">画像をコピー</button>
      </div>
    </section>
  </main>

  <!-- QRCode library from CDN for GitHub Pages compatibility -->
  <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js" defer></script>
  <script src="./app.js" defer></script>
</body>
</html>
