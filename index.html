<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>QRコードジェネレーター</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Zen+Kaku+Gothic+New:wght@400;500;700&family=DM+Serif+Display&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <main class="app-shell">
    <section class="card card-input">
      <p class="eyebrow">QRCode Generator</p>
      <h1>QRコードを作成</h1>
      <p class="lead">文字列やURLを入力して、QRコード画像を生成できます。</p>

      <label for="qr-text" class="label">テキスト / URL</label>
      <textarea id="qr-text" class="text-input" rows="5" placeholder="例: https://example.com"></textarea>

      <div class="controls">
        <button id="generate-btn" class="btn btn-primary" type="button">生成する</button>
        <button id="clear-btn" class="btn btn-ghost" type="button">クリア</button>
      </div>

      <p id="status" class="status" aria-live="polite"></p>
    </section>

    <section class="card card-output">
      <h2>プレビュー</h2>
      <div id="qr-preview" class="qr-preview" aria-label="QRコードプレビュー"></div>

      <div class="controls controls-output">
        <button id="download-btn" class="btn btn-primary" type="button" disabled>画像をダウンロード</button>
        <button id="copy-btn" class="btn btn-secondary" type="button" disabled>画像をコピー</button>
      </div>
    </section>
  </main>

  <script src="./node_modules/qrcodejs/qrcode.min.js" defer></script>
  <script src="./app.js" defer></script>
</body>
</html>
